<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 16x16 pixel-art basketball -->
  <rect width="16" height="16" fill="none"/>
  <!-- Ball body (orange circle via pixels) -->
  <rect x="5" y="1" width="6" height="1" fill="#f97316"/>
  <rect x="3" y="2" width="10" height="1" fill="#f97316"/>
  <rect x="2" y="3" width="12" height="1" fill="#f97316"/>
  <rect x="1" y="4" width="14" height="1" fill="#f97316"/>
  <rect x="1" y="5" width="14" height="1" fill="#f97316"/>
  <rect x="1" y="6" width="14" height="1" fill="#f97316"/>
  <rect x="1" y="7" width="14" height="1" fill="#f97316"/>
  <rect x="1" y="8" width="14" height="1" fill="#ea580c"/>
  <rect x="1" y="9" width="14" height="1" fill="#ea580c"/>
  <rect x="1" y="10" width="14" height="1" fill="#ea580c"/>
  <rect x="1" y="11" width="14" height="1" fill="#ea580c"/>
  <rect x="2" y="12" width="12" height="1" fill="#c2410c"/>
  <rect x="3" y="13" width="10" height="1" fill="#c2410c"/>
  <rect x="5" y="14" width="6" height="1" fill="#c2410c"/>
  <!-- Vertical seam -->
  <rect x="7" y="1" width="1" fill="#9a3412" height="14"/>
  <!-- Horizontal seam -->
  <rect x="1" y="7" width="14" height="1" fill="#9a3412"/>
  <!-- Curved seams (top) -->
  <rect x="3" y="3" width="1" height="1" fill="#9a3412"/>
  <rect x="5" y="2" width="1" height="1" fill="#9a3412"/>
  <rect x="9" y="2" width="1" height="1" fill="#9a3412"/>
  <rect x="11" y="3" width="1" height="1" fill="#9a3412"/>
  <!-- Curved seams (bottom) -->
  <rect x="3" y="12" width="1" height="1" fill="#7c2d12"/>
  <rect x="5" y="13" width="1" height="1" fill="#7c2d12"/>
  <rect x="9" y="13" width="1" height="1" fill="#7c2d12"/>
  <rect x="11" y="12" width="1" height="1" fill="#7c2d12"/>
  <!-- Highlight pixels -->
  <rect x="4" y="3" width="2" height="1" fill="#fb923c" opacity="0.7"/>
  <rect x="3" y="4" width="3" height="1" fill="#fb923c" opacity="0.5"/>
</svg>
