<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Stars pattern -->
    <pattern id="stars" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#1e3a8a"/>
      <polygon points="12,2 14,8 20,8 15,12 17,18 12,14 7,18 9,12 4,8 10,8" fill="white" opacity="0.85"/>
    </pattern>
    <!-- Stripes pattern -->
    <pattern id="stripes" x="0" y="0" width="8" height="16" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#dc2626"/>
      <rect y="8" width="8" height="8" fill="white"/>
    </pattern>
    <!-- Gold gradient for border -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Basketball gradient -->
    <linearGradient id="ball" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="seam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <!-- Clip for top half of text -->
    <clipPath id="topClip">
      <rect x="0" y="0" width="512" height="340"/>
    </clipPath>
    <!-- Clip for bottom half of text -->
    <clipPath id="botClip">
      <rect x="0" y="340" width="512" height="172"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a1a"/>

  <!-- Gold border -->
  <rect x="8" y="8" width="496" height="496" rx="88" fill="none" stroke="url(#gold)" stroke-width="8"/>

  <!-- Basketball icon -->
  <g transform="translate(256, 180)">
    <circle r="90" fill="url(#ball)"/>
    <ellipse cx="-20" cy="-25" rx="35" ry="28" fill="white" opacity="0.12"/>
    <line x1="0" y1="-90" x2="0" y2="90" stroke="url(#seam)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-90" y1="0" x2="90" y2="0" stroke="url(#seam)" stroke-width="5" stroke-linecap="round"/>
    <path d="M-60,-60 Q0,-30 60,-60" fill="none" stroke="url(#seam)" stroke-width="5" stroke-linecap="round"/>
    <path d="M-60,60 Q0,30 60,60" fill="none" stroke="url(#seam)" stroke-width="5" stroke-linecap="round"/>
    <circle r="90" fill="none" stroke="#9a3412" stroke-width="6" opacity="0.25"/>
  </g>

  <!-- "DD" text shadow -->
  <text x="256" y="410" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="88" font-weight="bold" font-style="italic" fill="#0a0a1a" opacity="0.6" transform="translate(4,4)">DD</text>

  <!-- "DD" text — stars fill (top half) -->
  <g clip-path="url(#topClip)">
    <text x="256" y="410" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="88" font-weight="bold" font-style="italic" fill="url(#stars)">DD</text>
  </g>

  <!-- "DD" text — stripes fill (bottom half) -->
  <g clip-path="url(#botClip)">
    <text x="256" y="410" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="88" font-weight="bold" font-style="italic" fill="url(#stripes)">DD</text>
  </g>

  <!-- "DD" gold outline -->
  <text x="256" y="410" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="88" font-weight="bold" font-style="italic" fill="none" stroke="url(#gold)" stroke-width="2">DD</text>

  <!-- Subtitle -->
  <text x="256" y="465" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="14" fill="#6b7280" letter-spacing="6">EST. 1987</text>
</svg>
